name: SDK publish smoke

# Runs nightly and on demand to catch publish-time regressions in
# @percolatorct/sdk that are invisible when pnpm resolves the workspace link.
#
# The job installs the *pinned npm version* of the SDK (not workspace:*) into a
# temporary directory, then runs only the sdk-smoke test file.  The rest of the
# percolator-indexer test suite is NOT executed here — it runs in ci.yml on every PR.
#
# To update the pinned version after a new SDK publish:
#   1. Change SDK_VERSION below.
#   2. Commit the change so nightly runs validate the new version.

on:
  schedule:
    # 06:00 UTC every day
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      sdk_version:
        description: "SDK version to smoke-test (overrides pinned default)"
        required: false
        default: ""
  repository_dispatch:
    # Triggered by percolator-sdk post-publish workflow via:
    #   gh api repos/dcccrypto/percolator-indexer/dispatches \
    #     --field event_type=sdk-published \
    #     --field client_payload[version]=2.0.5
    types: [sdk-published]

env:
  # Update this string when the SDK bumps.  Deliberate — that is the point.
  SDK_VERSION: "2.0.5"

concurrency:
  group: sdk-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: smoke @percolatorct/sdk@${{ github.event.client_payload.version || inputs.sdk_version || '2.0.5' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          # No cache: we are testing a fresh install, not a lockfile reproduction.

      # Resolve the version to test: repository_dispatch payload > workflow_dispatch
      # input > pinned default.
      - name: Resolve SDK version
        id: sdk_ver
        env:
          PAYLOAD_VER: ${{ github.event.client_payload.version }}
          INPUT_VER: ${{ inputs.sdk_version }}
        run: |
          VERSION="$PAYLOAD_VER"
          if [ -z "$VERSION" ]; then
            VERSION="$INPUT_VER"
          fi
          if [ -z "$VERSION" ]; then
            VERSION="${SDK_VERSION}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Testing @percolatorct/sdk@$VERSION"

      # Install dependencies from the *existing* lockfile first so all other
      # packages (hono, vitest, @solana/web3.js, @supabase/supabase-js …) are
      # present, then override only the SDK dep to the target npm version.
      - name: Install dependencies (frozen lockfile for non-SDK packages)
        run: pnpm install --frozen-lockfile

      # `pnpm add` rewrites the lockfile by design and does NOT accept
      # --no-frozen-lockfile (that flag belongs to `pnpm install`). Passing it
      # made pnpm 10 abort with `Unknown option: 'frozen-lockfile'`, failing
      # this job on every nightly run.
      - name: Override SDK dep with published npm version
        env:
          TARGET_VER: ${{ steps.sdk_ver.outputs.version }}
        run: |
          pnpm add "@percolatorct/sdk@${TARGET_VER}"

      - name: Verify installed SDK version
        env:
          TARGET_VER: ${{ steps.sdk_ver.outputs.version }}
        run: |
          INSTALLED=$(node -e "console.log(require('./node_modules/@percolatorct/sdk/package.json').version)")
          echo "Installed: $INSTALLED"
          if [ "$INSTALLED" != "$TARGET_VER" ]; then
            echo "Version mismatch: expected $TARGET_VER, got $INSTALLED"
            exit 1
          fi

      - name: Run SDK smoke tests
        run: pnpm vitest run tests/sdk-smoke.test.ts

      - name: Report result
        if: always()
        env:
          TARGET_VER: ${{ steps.sdk_ver.outputs.version }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            echo "@percolatorct/sdk@${TARGET_VER} smoke PASSED"
          else
            echo "@percolatorct/sdk@${TARGET_VER} smoke FAILED"
            exit 1
          fi
