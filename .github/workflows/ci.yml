name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      # #172: package.json/pnpm-lock.yaml resolve @percolatorct/sdk as
      # `file:../percolator-sdk`, so a bare checkout has no SDK to install and
      # `pnpm install --frozen-lockfile` dies with
      # `ENOENT ... scandir '<runner>/work/percolator-indexer/percolator-sdk'`.
      # Provide the sibling. actions/checkout cannot write outside
      # GITHUB_WORKSPACE, so check out into the workspace and then move it up.
      # percolator-sdk is public, so the default token suffices.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: dcccrypto/percolator-sdk
          ref: main
          path: _percolator-sdk
      - name: Place @percolatorct/sdk as a sibling checkout (#172)
        run: |
          rm -rf ../percolator-sdk
          mv _percolator-sdk ../percolator-sdk
          test -f ../percolator-sdk/dist/index.js || { echo "SDK dist/ missing — the SDK repo ships a committed dist; aborting"; exit 1; }
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high
      - run: pnpm build
      - run: pnpm test

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-and-test
    # #178 follow-up: this was gated to `refs/heads/main`, so the image was only
    # ever built AFTER merge — a Dockerfile or dependency change that broke the
    # build was invisible at review time and landed on main before anyone saw
    # it. Same hazard percolator-keeper#384 describes for its own docker job.
    # Running it on PRs is the only thing that makes a Dockerfile change
    # reviewable; the job is already self-contained (it checks the SDK into the
    # build context below).
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # #175: the image needs @percolatorct/sdk inside the build context, since
      # the lockfile resolves it as a filesystem path. Checked out INTO the
      # context (unlike build-and-test, which needs it as a sibling).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: dcccrypto/percolator-sdk
          ref: main
          path: percolator-sdk
      - name: Verify SDK dist is present in the build context
        run: test -f percolator-sdk/dist/index.js || { echo "SDK dist/ missing from build context"; exit 1; }
      - name: Build Docker image
        run: docker build -t percolator-indexer .

      # #178: "the image builds" does NOT prove the devDependencies were
      # actually dropped — the prune could silently no-op and this job would
      # stay green. Assert the outcome, not just the build.
      - name: Assert devDependencies are absent from the runtime image
        run: |
          set -euo pipefail
          for pkg in vitest vite tsx; do
            if docker run --rm --entrypoint sh percolator-indexer -c "test -e /app/node_modules/$pkg"; then
              echo "::error::devDependency '$pkg' is present in the runtime image (#178 regression)"
              exit 1
            fi
          done
          echo "OK: vitest, vite and tsx are absent from the runtime image"

      - name: Assert production dependencies survived the prune
        run: |
          set -euo pipefail
          # The mirror check: an over-aggressive prune that removed real
          # dependencies would also make the assertion above pass.
          for pkg in hono @supabase/supabase-js @solana/web3.js; do
            docker run --rm --entrypoint sh percolator-indexer -c "test -e /app/node_modules/$pkg" \
              || { echo "::error::production dependency '$pkg' missing from the runtime image"; exit 1; }
          done
          echo "OK: production dependencies are present"
